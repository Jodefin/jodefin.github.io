<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodefin</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0c;--bg2:#161512;--bg3:#1e1c18;--bg4:#252320;--border:#3a3630;--border2:#4a4640;--text:#e8e0d0;--text2:#a09880;--text3:#6a6250;--accent:#c8955a;--accent2:#8b6840;--ag:rgba(200,149,90,.15);}
[data-theme="light"]{--bg:#f5f0e8;--bg2:#fff;--bg3:#ede8de;--bg4:#e4ddd2;--border:#c8bca8;--border2:#b0a490;--text:#2c2418;--text2:#6b5d48;--text3:#9c8c78;--accent:#8b5e3c;--accent2:#6e4a2e;--ag:rgba(139,94,60,.1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes wiggle{0%,100%{transform:rotate(-1.5deg);}50%{transform:rotate(1.5deg);}}
#theme-btn{position:fixed;top:18px;right:18px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:20;}
#theme-btn:hover{border-color:var(--accent2);color:var(--accent);}
#add-btn{position:fixed;bottom:28px;right:28px;width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:20;box-shadow:0 4px 20px rgba(0,0,0,.35);}
#add-btn:hover{border-color:var(--accent2);color:var(--accent);background:var(--ag);}
#grid{display:grid;grid-template-columns:repeat(4,90px);gap:24px 16px;animation:fadeUp .4s ease;padding:16px;}
.ap{display:flex;flex-direction:column;align-items:center;gap:9px;padding:12px 6px;border-radius:16px;text-decoration:none;border:1px solid transparent;cursor:pointer;transition:all .18s;position:relative;-webkit-user-select:none;user-select:none;}
.ap:hover{background:var(--bg2);border-color:var(--border);transform:translateY(-3px);}
.ap:active{transform:scale(.93);}
.edit-mode .ap{animation:wiggle .45s infinite;}
.edit-mode .ap:hover{transform:none;}
.ic{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:1px solid rgba(255,255,255,.05);}
.ic-novel{background:linear-gradient(145deg,#2a1e12,#7a5230);}
.ic-coin{background:linear-gradient(145deg,#0d1f10,#1e6b2a);}
.ic-def{background:var(--bg3);border:1px solid var(--border2)!important;}
.ic-add{background:var(--bg3);border:2px dashed var(--border2)!important;font-size:24px;color:var(--text3);}
.an{font-size:11px;font-weight:500;color:var(--text2);text-align:center;line-height:1.35;max-width:82px;word-break:keep-all;}
.del{position:absolute;top:-7px;left:-7px;width:22px;height:22px;border-radius:50%;background:#c85a5a;border:2px solid var(--bg);color:#fff;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;z-index:5;font-weight:600;}
.edit-mode .del{display:flex;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.mo{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:320px;max-width:93vw;padding:22px;box-shadow:0 24px 56px rgba(0,0,0,.55);}
.mo h3{font-size:14px;font-weight:500;color:var(--text);margin-bottom:16px;}
.mr{margin-bottom:11px;}
.mr label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em;}
.mr input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;padding:8px 10px;outline:none;transition:border .15s;}
.mr input:focus{border-color:var(--accent2);}
.mf{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.mb{padding:7px 14px;border-radius:7px;font-size:12px;font-family:'Pretendard',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;}
.mb:hover{border-color:var(--accent2);color:var(--accent);}
.mb.p{background:var(--accent2);border-color:var(--accent);color:#fff;}
.mb.p:hover{background:var(--accent);}
@media(max-width:420px){#grid{grid-template-columns:repeat(3,82px);gap:18px 10px;}.ic{width:52px;height:52px;font-size:24px;}}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀</button>
<button id="add-btn" onclick="openMo()" title="앱 추가">+</button>
<div id="grid"></div>
<div class="ov" id="mo" onclick="if(event.target===this)closeMo()">
  <div class="mo">
    <h3>앱 추가</h3>
    <div class="mr"><label>이름</label><input id="mn" placeholder="예: 메모장"></div>
    <div class="mr"><label>URL</label><input id="mu" placeholder="https://..."></div>
    <div class="mr"><label>이모지 아이콘</label><input id="mi" placeholder="📝" maxlength="2"></div>
    <div class="mf">
      <button class="mb" onclick="closeMo()">취소</button>
      <button class="mb p" onclick="addApp()">추가</button>
    </div>
  </div>
</div>
<script>
const LSA='jdapps3',LST='jdtheme3';
const DEF=[
  {id:'novel',name:'웹소설 스튜디오',url:'https://jodefin.github.io/testnovel',icon:'📖',cls:'ic-novel'},
  {id:'coin', name:'코인 대시보드',  url:'#',                                  icon:'📈',cls:'ic-coin'},
];
let apps=[],editMode=false,theme='dark',lt;
function init(){
  theme=localStorage.getItem(LST)||'dark';applyTheme();
  try{const s=JSON.parse(localStorage.getItem(LSA));apps=Array.isArray(s)&&s.length?s:[...DEF];}catch{apps=[...DEF];}
  render();
}
function render(){
  const g=document.getElementById('grid');
  g.className=editMode?'edit-mode':'';
  g.innerHTML=apps.map(a=>`<a class="ap" href="${editMode?'javascript:void(0)':a.url}" ${!editMode&&a.url.startsWith('http')?'target="_blank"':''}>
    <button class="del" onclick="delApp('${a.id}',event)">×</button>
    <div class="ic ${a.cls||'ic-def'}">${a.icon}</div>
    <span class="an">${esc(a.name)}</span></a>`).join('')+
  `<div class="ap" onclick="openMo()"><div class="ic ic-add">+</div><span class="an" style="color:var(--text3)">추가</span></div>`;
}
function delApp(id,ev){ev.preventDefault();ev.stopPropagation();apps=apps.filter(a=>a.id!==id);save();render();}
function save(){localStorage.setItem(LSA,JSON.stringify(apps));}
document.getElementById('grid').addEventListener('pointerdown',()=>{lt=setTimeout(()=>{editMode=!editMode;render();},650);});
['pointerup','pointercancel','pointermove'].forEach(ev=>document.getElementById('grid').addEventListener(ev,()=>clearTimeout(lt)));
document.addEventListener('click',ev=>{if(editMode&&!document.getElementById('grid').contains(ev.target)&&ev.target.id!=='add-btn'){editMode=false;render();}});
function openMo(){document.getElementById('mo').classList.add('open');document.getElementById('mn').focus();}
function closeMo(){document.getElementById('mo').classList.remove('open');}
function addApp(){
  const name=document.getElementById('mn').value.trim();
  const url=document.getElementById('mu').value.trim();
  const icon=document.getElementById('mi').value.trim()||'🔗';
  if(!name||!url){alert('이름과 URL을 입력해주세요.');return;}
  const fullUrl=url.startsWith('http')?url:'https://'+url;
  apps.push({id:'a'+Date.now(),name,url:fullUrl,icon,cls:''});
  save();render();closeMo();
  ['mn','mu','mi'].forEach(id=>document.getElementById(id).value='');
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem(LST,theme);applyTheme();}
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);document.getElementById('theme-btn').textContent=theme==='dark'?'☀':'🌙';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body>
</html>
