<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodefin</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0c; --bg2:#161512; --bg3:#1e1c18; --bg4:#252320;
  --border:#3a3630; --border2:#4a4640;
  --text:#e8e0d0; --text2:#a09880; --text3:#6a6250;
  --accent:#c8955a; --accent2:#8b6840; --accent-glow:rgba(200,149,90,.15);
}
[data-theme="light"] {
  --bg:#f5f0e8; --bg2:#fff; --bg3:#ede8de; --bg4:#e4ddd2;
  --border:#c8bca8; --border2:#b0a490;
  --text:#2c2418; --text2:#6b5d48; --text3:#9c8c78;
  --accent:#8b5e3c; --accent2:#6e4a2e; --accent-glow:rgba(139,94,60,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Pretendard',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ── 테마 버튼 ── */
.theme-btn{
  position:fixed;top:16px;right:16px;
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--text2);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;z-index:10;
}
.theme-btn:hover{border-color:var(--accent2);color:var(--accent);}

/* ── 앱 추가 버튼 ── */
.add-btn{
  position:fixed;bottom:24px;right:24px;
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--text2);cursor:pointer;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;z-index:10;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.add-btn:hover{border-color:var(--accent2);color:var(--accent);background:var(--accent-glow);}

/* ── 앱 그리드 ── */
.app-grid{
  display:grid;
  grid-template-columns:repeat(4,88px);
  gap:20px 16px;
  animation:fadeIn .4s ease;
  padding:20px;
}
.app-item{
  display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:12px 6px;border-radius:14px;
  cursor:pointer;transition:all .15s;text-decoration:none;
  border:1px solid transparent;
}
.app-item:hover{background:var(--bg2);border-color:var(--border);transform:translateY(-3px);}
.app-item:active{transform:scale(.94);}
.app-icon{
  width:56px;height:56px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.06);
}
.app-name{
  font-size:11px;font-weight:500;color:var(--text2);
  text-align:center;line-height:1.35;word-break:keep-all;
  max-width:80px;
}
/* 아이콘 색 */
.ic-novel  {background:linear-gradient(145deg,#2a1e12,#7a5230);}
.ic-coin   {background:linear-gradient(145deg,#0d1f10,#1e6b2a);}
.ic-add    {background:var(--bg3);border:2px dashed var(--border2)!important;}

/* ── 추가 모달 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:320px;max-width:95vw;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.modal h3{font-size:14px;font-weight:500;margin-bottom:16px;color:var(--text);}
.mrow{margin-bottom:11px;}
.mrow label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.mrow input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;padding:8px 10px;outline:none;transition:border .15s;}
.mrow input:focus{border-color:var(--accent2);}
.mfoot{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.mbtn{padding:7px 14px;border-radius:7px;font-size:12px;font-family:'Pretendard',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;}
.mbtn:hover{border-color:var(--accent2);color:var(--accent);}
.mbtn.pri{background:var(--accent2);border-color:var(--accent);color:#fff;}
.mbtn.pri:hover{background:var(--accent);}

/* ── 삭제 버튼 (편집 모드) ── */
.del-btn{
  position:absolute;top:-6px;left:-6px;
  width:20px;height:20px;border-radius:50%;
  background:#c85a5a;border:none;color:#fff;
  font-size:13px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  line-height:1;z-index:2;
}
.edit-mode .app-item{position:relative;}
.edit-mode .del-btn{display:flex;}
.edit-mode .app-item{animation:wiggle .5s infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}

/* ── MOBILE ── */
@media(max-width:420px){
  .app-grid{grid-template-columns:repeat(3,80px);gap:14px 10px;}
  .app-icon{width:50px;height:50px;font-size:22px;}
}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀</button>
<button class="add-btn" onclick="openModal()" title="앱 추가">+</button>

<div class="app-grid" id="app-grid"></div>

<!-- 추가 모달 -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>앱 추가</h3>
    <div class="mrow"><label>이름</label><input id="a-name" placeholder="예: 메모장"></div>
    <div class="mrow"><label>URL</label><input id="a-url" placeholder="https://..."></div>
    <div class="mrow"><label>이모지 아이콘</label><input id="a-icon" placeholder="📝" maxlength="2"></div>
    <div class="mrow"><label>배경 색상 (선택)</label><input id="a-color" placeholder="예: #2a1e12,#7a5230 (그라디언트)"></div>
    <div class="mfoot">
      <button class="mbtn" onclick="closeModal()">취소</button>
      <button class="mbtn pri" onclick="addApp()">추가</button>
    </div>
  </div>
</div>

<script>
const LS_APPS  = 'jd_apps';
const LS_THEME = 'jd_theme';

const DEFAULT = [
  { id:'novel', name:'웹소설 스튜디오', url:'https://jodefin.github.io/testnovel', icon:'📖', color:'ic-novel' },
  { id:'coin',  name:'코인 대시보드',   url:'#',                                   icon:'📈', color:'ic-coin'  },
];

let apps = [];
let editMode = false;
let currentTheme = 'dark';

function init() {
  // 테마
  const t = localStorage.getItem(LS_THEME) || 'dark';
  setTheme(t);

  // 앱 목록
  try {
    const s = JSON.parse(localStorage.getItem(LS_APPS));
    apps = s?.length ? s : [...DEFAULT];
  } catch { apps = [...DEFAULT]; }

  render();
}

function render() {
  const grid = document.getElementById('app-grid');
  grid.className = 'app-grid' + (editMode ? ' edit-mode' : '');
  grid.innerHTML = apps.map(a => `
    <a class="app-item" href="${editMode ? '#' : a.url}"
       target="${!editMode && a.url.startsWith('http') ? '_blank' : '_self'}"
       onclick="${editMode ? 'return false' : ''}">
      ${editMode ? `<button class="del-btn" onclick="delApp('${a.id}',event)">×</button>` : ''}
      <div class="app-icon ${a.color||''}" style="${a.bg ? `background:linear-gradient(145deg,${a.bg})` : (!a.color ? 'background:var(--bg3);border:1px solid var(--border2)' : '')}">${a.icon}</div>
      <span class="app-name">${e(a.name)}</span>
    </a>`).join('');
}

// 앱 추가
function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('a-name').focus(); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function addApp() {
  const name  = document.getElementById('a-name').value.trim();
  const url   = document.getElementById('a-url').value.trim();
  const icon  = document.getElementById('a-icon').value.trim() || '🔗';
  const color = document.getElementById('a-color').value.trim();
  if (!name || !url) { alert('이름과 URL을 입력해주세요.'); return; }
  apps.push({ id:'app_'+Date.now(), name, url, icon, color:'', bg: color || '' });
  save(); render(); closeModal();
  ['a-name','a-url','a-icon','a-color'].forEach(id => document.getElementById(id).value='');
}

// 앱 삭제 (길게 누르거나 편집 모드)
function delApp(id, ev) {
  ev.preventDefault(); ev.stopPropagation();
  apps = apps.filter(a => a.id !== id);
  save(); render();
}

// 길게 누르면 편집 모드
let longPress;
document.getElementById('app-grid').addEventListener('pointerdown', e => {
  longPress = setTimeout(() => { editMode = !editMode; render(); }, 600);
});
document.getElementById('app-grid').addEventListener('pointerup',   () => clearTimeout(longPress));
document.getElementById('app-grid').addEventListener('pointermove',  () => clearTimeout(longPress));

// 편집 모드 외부 클릭 시 해제
document.addEventListener('click', e => {
  if (editMode && !document.getElementById('app-grid').contains(e.target)) {
    editMode = false; render();
  }
});

function save() { localStorage.setItem(LS_APPS, JSON.stringify(apps)); }

// 테마
function toggleTheme() { setTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
function setTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀' : '🌙';
  localStorage.setItem(LS_THEME, t);
}

function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodefin</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0c; --bg2:#161512; --bg3:#1e1c18; --bg4:#252320;
  --border:#3a3630; --border2:#4a4640;
  --text:#e8e0d0; --text2:#a09880; --text3:#6a6250;
  --accent:#c8955a; --accent2:#8b6840; --accent-glow:rgba(200,149,90,.15);
}
[data-theme="light"] {
  --bg:#f8f4ee; --bg2:#fff; --bg3:#f0ebe2; --bg4:#e8e0d4;
  --border:#d8cfc4; --border2:#c8bdb0;
  --text:#2c2418; --text2:#6b5d48; --text3:#9c8c78;
  --accent:#8b5e3c; --accent2:#6e4a2e; --accent-glow:rgba(139,94,60,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* ── HEADER ── */
.header {
  padding: 20px 24px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.logo {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .04em;
}
.logo span { color: var(--text3); font-weight: 300; }
.header-r { display: flex; align-items: center; gap: 10px; }
.theme-toggle {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text2); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.theme-toggle:hover { border-color: var(--accent2); color: var(--accent); }
.date-lbl { font-size: 12px; color: var(--text3); }

/* ── SEARCH ── */
.search-wrap {
  padding: 20px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.search-box {
  max-width: 480px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 9px 16px;
  transition: border .15s;
}
.search-box:focus-within { border-color: var(--accent2); }
.search-box input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: 'Pretendard', sans-serif;
}
.search-box input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: 15px; }

/* ── MAIN ── */
.main { flex: 1; padding: 28px 24px; max-width: 800px; margin: 0 auto; width: 100%; }

/* ── SECTION ── */
.section { margin-bottom: 36px; animation: fadeIn .4s ease both; }
.section:nth-child(2) { animation-delay: .08s; }
.section:nth-child(3) { animation-delay: .16s; }
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 13px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: .1em;
}
.section-edit {
  font-size: 11px; color: var(--text3); cursor: pointer;
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
  background: none; font-family: 'Pretendard', sans-serif; transition: all .15s;
}
.section-edit:hover { border-color: var(--accent2); color: var(--accent); }

/* ── APP GRID ── */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 8px;
}
.app-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 14px 8px; border-radius: 12px;
  cursor: pointer; transition: all .15s; text-decoration: none;
  border: 1px solid transparent;
  position: relative;
}
.app-item:hover {
  background: var(--bg3);
  border-color: var(--border);
  transform: translateY(-2px);
}
.app-item:active { transform: scale(.96); }
.app-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  transition: transform .15s;
}
.app-item:hover .app-icon { animation: pulse .4s ease; }
.app-name {
  font-size: 11px; font-weight: 500; color: var(--text2);
  text-align: center; line-height: 1.3; word-break: keep-all;
}
.app-badge {
  position: absolute; top: 10px; right: 14px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
}
/* 앱 아이콘 색상 */
.ic-novel  { background: linear-gradient(135deg,#3a2c1e,#6b4c2a); }
.ic-coin   { background: linear-gradient(135deg,#1a2a1a,#2d6a2d); }
.ic-add    { background: var(--bg3); border: 2px dashed var(--border2); }

/* ── RECENT ── */
.recent-list { display: flex; flex-direction: column; gap: 6px; }
.recent-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 10px;
  background: var(--bg2); border: 1px solid var(--border);
  cursor: pointer; text-decoration: none; transition: all .15s;
}
.recent-item:hover { border-color: var(--border2); background: var(--bg3); }
.recent-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.recent-info { flex: 1; min-width: 0; }
.recent-name { font-size: 13px; font-weight: 500; color: var(--text); }
.recent-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
.recent-time { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.recent-arrow { font-size: 12px; color: var(--text3); flex-shrink: 0; }

/* ── WEATHER WIDGET ── */
.widget-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 36px; animation: fadeIn .4s .24s ease both; }
.widget-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
}
.widget-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.widget-val { font-size: 22px; font-weight: 500; color: var(--text); }
.widget-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── ADD MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 100;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 14px; width: 340px; max-width: 95vw;
  padding: 20px; box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 16px; color: var(--text); }
.modal-row { margin-bottom: 12px; }
.modal-row label { font-size: 12px; color: var(--text3); display: block; margin-bottom: 5px; }
.modal-row input {
  width: 100%; background: var(--bg4); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 13px;
  font-family: 'Pretendard', sans-serif; padding: 8px 10px; outline: none;
}
.modal-row input:focus { border-color: var(--accent2); }
.modal-foot { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.mbtn {
  padding: 7px 16px; border-radius: 7px; font-size: 12px;
  font-family: 'Pretendard', sans-serif; cursor: pointer;
  border: 1px solid var(--border2); background: var(--bg3); color: var(--text2);
  transition: all .15s;
}
.mbtn:hover { border-color: var(--accent2); color: var(--accent); }
.mbtn.pri { background: var(--accent2); border-color: var(--accent); color: #fff; }
.mbtn.pri:hover { background: var(--accent); }

/* ── FOOTER ── */
.footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  background: var(--bg2);
}

/* ── MOBILE ── */
@media(max-width: 480px) {
  .header { padding: 14px 16px; }
  .search-wrap { padding: 14px 16px; }
  .main { padding: 20px 16px; }
  .app-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .app-icon { width: 46px; height: 46px; font-size: 20px; border-radius: 12px; }
  .widget-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Jodefin <span>홈</span></div>
  <div class="header-r">
    <span class="date-lbl" id="date-lbl"></span>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="검색하거나 URL을 입력하세요" id="search-inp" onkeydown="onSearch(event)">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- 앱 그리드 -->
  <div class="section">
    <div class="section-hdr">
      <span class="section-title">내 앱</span>
      <button class="section-edit" onclick="openAddModal()">+ 추가</button>
    </div>
    <div class="app-grid" id="app-grid"></div>
  </div>

  <!-- 최근 방문 -->
  <div class="section">
    <div class="section-hdr">
      <span class="section-title">최근 방문</span>
    </div>
    <div class="recent-list" id="recent-list"></div>
  </div>

</div>

<!-- ADD MODAL -->
<div class="overlay" id="add-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>앱 추가</h3>
    <div class="modal-row">
      <label>앱 이름</label>
      <input type="text" id="add-name" placeholder="예: 메모장">
    </div>
    <div class="modal-row">
      <label>URL</label>
      <input type="text" id="add-url" placeholder="예: https://jodefin.github.io/memo">
    </div>
    <div class="modal-row">
      <label>이모지 아이콘</label>
      <input type="text" id="add-icon" placeholder="예: 📝" maxlength="2">
    </div>
    <div class="modal-row">
      <label>설명 (선택)</label>
      <input type="text" id="add-desc" placeholder="예: 빠른 메모 앱">
    </div>
    <div class="modal-foot">
      <button class="mbtn" onclick="closeModal()">취소</button>
      <button class="mbtn pri" onclick="addApp()">추가</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer" id="footer-time"></div>

<script>
// ── 기본 앱 목록 ──
const DEFAULT_APPS = [
  { id:'novel',  name:'웹소설 스튜디오', url:'https://jodefin.github.io/testnovel', icon:'📖', desc:'소설 작성 & 편집', color:'ic-novel' },
  { id:'coin',   name:'코인 대시보드',   url:'#coin',                               icon:'📈', desc:'실시간 시세',    color:'ic-coin' },
];

const LS_APPS    = 'jd_apps';
const LS_RECENT  = 'jd_recent';
const LS_THEME   = 'jd_theme';

let apps = [];

// ── 초기화 ──
function init() {
  // 테마
  const theme = localStorage.getItem(LS_THEME) || 'dark';
  setTheme(theme);

  // 앱 목록
  try {
    const saved = JSON.parse(localStorage.getItem(LS_APPS));
    apps = saved?.length ? saved : [...DEFAULT_APPS];
  } catch { apps = [...DEFAULT_APPS]; }

  renderApps();
  renderRecent();
  updateTime();
  setInterval(updateTime, 60000);
}

// ── 시간 업데이트 ──
function updateTime() {
  const now = new Date();
  const date = now.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' });
  const time = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('date-lbl').textContent = date;
  document.getElementById('footer-time').textContent = `${date} ${time}`;
}

// ── 앱 렌더링 ──
function renderApps() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = apps.map(a => `
    <a class="app-item" href="${a.url}" onclick="addRecent('${a.id}')" target="${a.url.startsWith('http') ? '_blank' : '_self'}">
      <div class="app-icon ${a.color || ''}" style="${!a.color ? 'background:var(--bg3);border:1px solid var(--border2)' : ''}">${a.icon}</div>
      <span class="app-name">${e(a.name)}</span>
    </a>
  `).join('') + `
    <div class="app-item" onclick="openAddModal()">
      <div class="app-icon ic-add" style="font-size:22px;color:var(--text3)">+</div>
      <span class="app-name" style="color:var(--text3)">추가</span>
    </div>`;
}

// ── 최근 방문 ──
function addRecent(id) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  let recent = getRecent();
  recent = recent.filter(r => r.id !== id);
  recent.unshift({ id: app.id, name: app.name, url: app.url, icon: app.icon, color: app.color, desc: app.desc, time: Date.now() });
  recent = recent.slice(0, 5);
  localStorage.setItem(LS_RECENT, JSON.stringify(recent));
}

function getRecent() {
  try { return JSON.parse(localStorage.getItem(LS_RECENT)) || []; } catch { return []; }
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  const recent = getRecent();
  if (!recent.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:12px 0">아직 방문한 앱이 없습니다.</div>';
    return;
  }
  list.innerHTML = recent.map(r => {
    const mins = Math.round((Date.now() - r.time) / 60000);
    const timeStr = mins < 1 ? '방금 전' : mins < 60 ? `${mins}분 전` : mins < 1440 ? `${Math.round(mins/60)}시간 전` : `${Math.round(mins/1440)}일 전`;
    return `
      <a class="recent-item" href="${r.url}" target="_blank" onclick="addRecent('${r.id}')">
        <div class="recent-icon ${r.color||''}" style="${!r.color?'background:var(--bg3);border:1px solid var(--border)':''}">${r.icon}</div>
        <div class="recent-info">
          <div class="recent-name">${e(r.name)}</div>
          <div class="recent-desc">${e(r.desc||'')}</div>
        </div>
        <span class="recent-time">${timeStr}</span>
        <span class="recent-arrow">›</span>
      </a>`;
  }).join('');
}

// ── 앱 추가 ──
function openAddModal() { document.getElementById('add-modal').classList.add('open'); document.getElementById('add-name').focus(); }
function closeModal()   { document.getElementById('add-modal').classList.remove('open'); }

function addApp() {
  const name = document.getElementById('add-name').value.trim();
  const url  = document.getElementById('add-url').value.trim();
  const icon = document.getElementById('add-icon').value.trim() || '🔗';
  const desc = document.getElementById('add-desc').value.trim();
  if (!name || !url) { alert('이름과 URL을 입력해주세요.'); return; }
  const id = 'app_' + Date.now();
  apps.push({ id, name, url, icon, desc, color: '' });
  localStorage.setItem(LS_APPS, JSON.stringify(apps));
  renderApps();
  closeModal();
  ['add-name','add-url','add-icon','add-desc'].forEach(id => document.getElementById(id).value = '');
}

// ── 검색 ──
function onSearch(e) {
  if (e.key !== 'Enter') return;
  const q = document.getElementById('search-inp').value.trim();
  if (!q) return;
  const url = q.startsWith('http') || q.includes('.') ? (q.startsWith('http') ? q : 'https://'+q) : `https://search.naver.com/search.naver?query=${encodeURIComponent(q)}`;
  window.open(url, '_blank');
  document.getElementById('search-inp').value = '';
}

// ── 테마 ──
let currentTheme = 'dark';
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  setTheme(currentTheme);
}
function setTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀' : '🌙';
  localStorage.setItem(LS_THEME, t);
}

function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
